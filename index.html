<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Oz Trip</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: system-ui; }
#map { height:100vh; }

.slider {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  z-index: 1000;
}

.label {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,0,0,0.9); /* DEBUG RED */
  color: white;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
  z-index: 9999;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// === MAP
var map = L.map('map').setView([-25, 135], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// === LOAD DATA
Promise.all([
  fetch('route_past.geojson').then(r => r.json()),
  fetch('route_live.geojson').then(r => r.json())
]).then(([past, live]) => {

  let raw = [...(past.features || []), ...(live.features || [])];

  let segments = [];

  raw.forEach(f => {
    let coords = f.geometry.coordinates;
    let times = f.properties?.times || [];

    if (Array.isArray(coords[0][0])) coords = coords[0];

    for (let i = 1; i < coords.length; i++) {
      segments.push({
        coords: [
          [coords[i-1][1], coords[i-1][0]],
          [coords[i][1], coords[i][0]]
        ],
        time: times[Math.min(i, times.length - 1)] || null
      });
    }
  });

  console.log("SEGMENTS:", segments.length);
  console.log("FIRST SEGMENT:", segments[0]);

  if (segments.length === 0) return;

  // === LAYERS
  let layerGroup = L.featureGroup().addTo(map);

  // === SLIDER
  let slider = document.createElement("input");
  slider.type = "range";
  slider.className = "slider";
  slider.min = 0;
  slider.max = segments.length - 1;
  slider.value = segments.length - 1;
  document.body.appendChild(slider);

  // === LABEL
  let label = document.createElement("div");
  label.className = "label";
  label.innerText = "INIT";
  document.body.appendChild(label);

  // === DRAW FUNCTION
  function draw(index) {

    console.log("DRAW:", index);

    layerGroup.clearLayers();

    for (let i = 0; i <= index; i++) {
      L.polyline(segments[i].coords, {
        color: "red",
        weight: 4
      }).addTo(layerGroup);
    }

    let t = segments[index].time;

    console.log("TIME RAW:", t);

    if (t) {
      let d = new Date(t);

      let dateStr = d.toLocaleDateString();
      let timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      console.log("FORMATTED:", dateStr, timeStr);

      label.innerHTML =
        "📅 " + dateStr +
        "<br>⏱ " + timeStr;
    } else {
      label.innerText = "NO TIME DATA";
    }
  }

  // === INITIAL DRAW
  draw(segments.length - 1);

  // === FIT MAP
  let bounds = layerGroup.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding:[50,50] });
  }

  // === SLIDER EVENT
  slider.oninput = function() {
    draw(parseInt(this.value));
  };

});

</script>

</body>
</html>
