<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Bori & Simon explore Oz in FUJI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: system-ui; }
#map { height:100vh; }

.panel {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 10px;
}

.map-btn {
  display: block;
  margin: 6px 0;
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  background: #eee;
  cursor: pointer;
}

.map-btn.active {
  background: #ff5500;
  color: white;
}

.odo {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  padding: 12px;
  border-radius: 12px;
}

.slider {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  z-index: 1000;
}

.label {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <button class="map-btn active" data-style="osm">🗺 Default</button>
  <button class="map-btn" data-style="terrain">🏔 Terrain</button>
  <button class="map-btn" data-style="sat">🛰 Satellite</button>
</div>

<div class="odo" id="odoTile">🚐 Loading...</div>

<script>

// === MAP INIT
var map = L.map('map', {
  center: [-25, 135],
  zoom: 4,
  maxBounds: [[-50,105],[-5,165]]
});

// === MAP STYLES
var layers = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
  terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
};

layers.osm.addTo(map);

// === STYLE SWITCHER
document.querySelectorAll('.map-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    Object.values(layers).forEach(l => map.removeLayer(l));
    layers[btn.dataset.style].addTo(map);
  };
});

// === ODO
fetch('odo.json')
.then(res => res.json())
.then(data => {
  let trip = data.current_odo - data.trip_start_odo;
  document.getElementById("odoTile").innerHTML =
    `🚐 ${data.current_odo.toLocaleString()} km<br>🗺 ${trip.toLocaleString()} km trip`;
});

// === ROUTE
Promise.allSettled([
  fetch('route_past.geojson').then(r => r.json()),
  fetch('route_live.geojson').then(r => r.json())
]).then(results => {

  let past = results[0].status === "fulfilled" ? results[0].value : {features: []};
  let live = results[1].status === "fulfilled" ? results[1].value : {features: []};

  let raw = [...(past.features || []), ...(live.features || [])];

  let segments = [];

  raw.forEach(f => {
  let coords = f.geometry.coordinates;
  let times = f.properties?.times || [];

  if (Array.isArray(coords[0][0])) coords = coords[0];

  for (let i = 1; i < coords.length; i++) {
    segments.push({
      coords: [
        [coords[i-1][1], coords[i-1][0]],
        [coords[i][1], coords[i][0]]
      ],
      time: times[i] || times[i-1] || null
    });
  }
  });

  console.log("SEGMENTS:", segments.length);

  if (segments.length === 0) return;

  let layerGroup = L.featureGroup().addTo(map);

  let slider = document.createElement("input");
  slider.type = "range";
  slider.className = "slider";
  slider.min = 0;
  slider.max = segments.length - 1;
  slider.value = segments.length - 1;
  document.body.appendChild(slider);

  let label = document.createElement("div");
  label.className = "label";
  document.body.appendChild(label);

function draw(index) {
  layerGroup.clearLayers();

  for (let i = 0; i <= index; i++) {
    L.polyline(segments[i].coords, {
      color: `hsl(${i * 2}, 80%, 50%)`,
      weight: 4
    }).addTo(layerGroup);
  }

  // 👉 FORMAT DATE
  let t = segments[index].time;
  if (t) {
    let d = new Date(t);
    label.innerText = d.toLocaleDateString();
  } else {
    label.innerText = "No date";
  }
}

  // initial draw
  draw(segments.length - 1);

  // zoom once
  let bounds = layerGroup.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding:[50,50] });
  }

  slider.oninput = () => draw(parseInt(slider.value));

});

</script>

</body>
</html>
