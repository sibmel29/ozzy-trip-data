<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Oz Trip</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: system-ui; }
#map { height:100vh; }

/* Slider */
.slider {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  z-index: 1000;
}

/* Date label */
.label {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 18px;
  border-radius: 14px;
  text-align: center;
  font-size: 14px;
  backdrop-filter: blur(8px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  z-index: 1000;
}

/* ODO tile */
.odo {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  padding: 10px 12px 12px;
  border-radius: 12px;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  min-width: 130px;
}

.odo-logo {
  display: block;
  width: 108px;
  max-width: 100%;
  height: auto;
  margin: 0 auto 8px;
  border-radius: 6px;
}

.odo-values {
  line-height: 1.35;
}

/* Map style panel */
.panel {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.hike-panel {
  position: fixed;
  top: 178px;
  right: 20px;
  z-index: 1000;
  font-size: 12px;
}

.hike-menu-button {
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border: 3px solid white;
  border-radius: 50%;
  background: #166534;
  color: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  cursor: pointer;
  font-weight: 800;
}

.hike-menu-icon {
  font-size: 17px;
  line-height: 1;
}

.hike-menu-arrow {
  font-size: 12px;
  line-height: 1;
  transition: transform 0.18s ease;
}

.hike-panel.open .hike-menu-arrow {
  transform: rotate(180deg);
}

.hike-menu-content {
  display: none;
  position: absolute;
  top: 0;
  right: 52px;
  width: 142px;
  background: rgba(255,255,255,0.94);
  padding: 8px 10px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.hike-panel.open .hike-menu-content {
  display: block;
}

.hike-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 700;
  cursor: pointer;
}

.hike-stats {
  display: grid;
  gap: 2px;
  margin-top: 6px;
  color: #333;
}

.hike-stats strong {
  color: #166534;
}

.fish-panel {
  position: fixed;
  top: 232px;
  right: 20px;
  z-index: 1000;
  font-size: 12px;
}

.fish-menu-button {
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border: 3px solid white;
  border-radius: 50%;
  background: #0f766e;
  color: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  cursor: pointer;
  font-weight: 800;
}

.fish-menu-icon {
  font-size: 17px;
  line-height: 1;
}

.fish-menu-arrow {
  font-size: 12px;
  line-height: 1;
  transition: transform 0.18s ease;
}

.fish-panel.open .fish-menu-arrow {
  transform: rotate(180deg);
}

.fish-menu-content {
  display: none;
  position: absolute;
  top: 0;
  right: 52px;
  width: 156px;
  max-height: 210px;
  overflow: auto;
  background: rgba(255,255,255,0.94);
  padding: 8px 10px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.fish-panel.open .fish-menu-content {
  display: block;
}

.fish-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 700;
  cursor: pointer;
}

.fish-stats {
  display: grid;
  gap: 3px;
  margin-top: 7px;
  color: #333;
}

.fish-stats span {
  display: flex;
  justify-content: space-between;
  gap: 8px;
}

.fish-stats strong {
  color: #0f766e;
}

.surf-panel {
  position: fixed;
  top: 286px;
  right: 20px;
  z-index: 1000;
  font-size: 12px;
}

.surf-menu-button {
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border: 3px solid white;
  border-radius: 50%;
  background: #0369a1;
  color: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  cursor: pointer;
  font-weight: 800;
}

.surf-menu-icon {
  font-size: 18px;
  line-height: 1;
}

.surf-menu-arrow {
  font-size: 12px;
  line-height: 1;
  transition: transform 0.18s ease;
}

.surf-panel.open .surf-menu-arrow {
  transform: rotate(180deg);
}

.surf-menu-content {
  display: none;
  position: absolute;
  top: 0;
  right: 52px;
  width: 156px;
  max-height: 210px;
  overflow: auto;
  background: rgba(255,255,255,0.94);
  padding: 8px 10px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.surf-panel.open .surf-menu-content {
  display: block;
}

.surf-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 700;
  cursor: pointer;
}

.surf-stats {
  display: grid;
  gap: 3px;
  margin-top: 7px;
  color: #333;
}

.surf-stats span {
  display: flex;
  justify-content: space-between;
  gap: 8px;
}

.surf-stats strong {
  color: #0369a1;
}

.map-btn {
  display: block;
  margin: 5px 0;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  background: #eee;
  cursor: pointer;
}

.map-btn.active {
  background: #ff5500;
  color: white;
}

.current-marker {
  position: relative;
  width: 24px;
  height: 24px;
}

.current-marker::before {
  content: "";
  position: absolute;
  inset: 3px;
  background: #ff5500;
  border: 3px solid white;
  border-radius: 50% 50% 50% 0;
  box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  transform: rotate(-45deg);
}

.current-marker::after {
  content: "";
  position: absolute;
  top: 9px;
  left: 9px;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
}

.poi-marker {
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  background: #155e75;
  border: 3px solid white;
  border-radius: 50%;
  box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  color: white;
  font-size: 14px;
  font-weight: 700;
}

.poi-marker.sun {
  background: #f59e0b;
  color: #fff7ed;
  font-size: 16px;
}

.poi-marker.star {
  background: #7c3aed;
  color: white;
  font-size: 15px;
}

.poi-marker.camera {
  background: #0f766e;
  color: white;
  font-size: 13px;
}

.poi-marker.camp {
  background: #166534;
  color: white;
  font-size: 13px;
}

.poi-marker.food {
  background: #be123c;
  color: white;
  font-size: 13px;
}

.poi-marker.forest {
  background: #166534;
  color: white;
  font-size: 14px;
}

.poi-marker.mountain {
  background: #475569;
  color: white;
  font-size: 14px;
}

.poi-marker.fish {
  background: #0f766e;
  color: white;
  font-size: 14px;
}

.poi-marker.surf {
  background: #0369a1;
  color: white;
  font-size: 16px;
}

.hike-marker {
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  background: #166534;
  border: 3px solid white;
  border-radius: 50%;
  box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  color: white;
  font-size: 15px;
}

.story-window {
  position: fixed;
  right: 20px;
  top: 90px;
  width: min(380px, calc(100vw - 40px));
  max-height: calc(100vh - 130px);
  overflow: auto;
  z-index: 1600;
  background: white;
  border-radius: 12px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  display: none;
}

.story-window.visible {
  display: block;
}

.story-header {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 16px 8px;
}

.story-header h2 {
  margin: 0;
  font-size: 20px;
}

.story-date {
  margin-top: 4px;
  color: #555;
  font-size: 13px;
}

.story-close {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: #eee;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
}

.story-media {
  position: relative;
  padding: 8px 16px 0;
}

.story-media img {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: 10px;
  display: block;
  cursor: zoom-in;
}

.story-gallery-controls {
  position: absolute;
  inset: 8px 16px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
}

.story-gallery-controls button {
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.62);
  color: white;
  cursor: pointer;
  font-size: 22px;
  pointer-events: auto;
}

.story-image-count {
  position: absolute;
  right: 26px;
  bottom: 10px;
  background: rgba(0,0,0,0.62);
  color: white;
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 12px;
}

.story-body {
  padding: 12px 16px 16px;
  font-size: 14px;
  line-height: 1.45;
}

.story-body p {
  margin: 0 0 10px;
}

.story-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding-top: 4px;
}

.story-tags span {
  background: #e0f2fe;
  color: #155e75;
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 12px;
}

.story-details {
  display: grid;
  gap: 5px;
  margin: 10px 0;
  padding: 9px 10px;
  border-radius: 8px;
  background: rgba(15, 23, 42, 0.06);
  color: #223;
  font-size: 12px;
}

.story-details div {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.story-details dt {
  font-weight: 800;
}

.story-details dd {
  margin: 0;
  text-align: right;
}

.lightbox {
  position: fixed;
  inset: 0;
  z-index: 2600;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.9);
}

.lightbox.visible {
  display: flex;
}

.lightbox img {
  max-width: 94vw;
  max-height: 88vh;
  object-fit: contain;
}

.lightbox button {
  position: fixed;
  top: 18px;
  right: 18px;
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* Welcome popup */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.popup.visible {
  display: flex;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.3s ease;
}

.popup-img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.popup button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #ff5500;
  color: white;
  cursor: pointer;
}

@keyframes fadeIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="map"></div>

<div class="odo" id="odoTile">
  <img src="fuji-logo.png" class="odo-logo" alt="Fuji logo" />
  <div class="odo-values">🚐 Loading...</div>
</div>

<div class="panel">
  <button class="map-btn active" data-style="osm">🗺</button>
  <button class="map-btn" data-style="terrain">🏔</button>
  <button class="map-btn" data-style="sat">🛰</button>
</div>

<div class="hike-panel" id="hikePanel">
  <button class="hike-menu-button" id="hikeMenuButton" type="button" aria-label="Hike layer" aria-expanded="false" aria-controls="hikeMenuContent">
    <span class="hike-menu-icon">🚶</span>
    <span class="hike-menu-arrow">⌄</span>
  </button>
  <div class="hike-menu-content" id="hikeMenuContent">
    <label class="hike-toggle">
      <input type="checkbox" id="hikeToggle">
      <span>Hikes</span>
    </label>
    <div class="hike-stats" id="hikeStats">
      <span>No hikes loaded</span>
    </div>
  </div>
</div>

<div class="fish-panel" id="fishPanel">
  <button class="fish-menu-button" id="fishMenuButton" type="button" aria-label="Fishing log layer" aria-expanded="false" aria-controls="fishMenuContent">
    <span class="fish-menu-icon">🎣</span>
    <span class="fish-menu-arrow">⌄</span>
  </button>
  <div class="fish-menu-content" id="fishMenuContent">
    <label class="fish-toggle">
      <input type="checkbox" id="fishToggle">
      <span>Fishing</span>
    </label>
    <div class="fish-stats" id="fishStats">
      <span>No catches loaded</span>
    </div>
  </div>
</div>

<div class="surf-panel" id="surfPanel">
  <button class="surf-menu-button" id="surfMenuButton" type="button" aria-label="Surf log layer" aria-expanded="false" aria-controls="surfMenuContent">
    <span class="surf-menu-icon">≈</span>
    <span class="surf-menu-arrow">⌄</span>
  </button>
  <div class="surf-menu-content" id="surfMenuContent">
    <label class="surf-toggle">
      <input type="checkbox" id="surfToggle">
      <span>Surf</span>
    </label>
    <div class="surf-stats" id="surfStats">
      <span>No surfs loaded</span>
    </div>
  </div>
</div>

<div id="popup" class="popup">
  <div class="popup-content">
    <img src="sticker.png" class="popup-img" alt="Fuji Road Trip sticker" />

    <h2>🚐 Fuji Road Trip</h2>

    <p>
      Follow our journey across Australia.<br><br>
      Use the slider at the bottom to travel through time and see where we've been.
    </p>

    <button id="closePopup">Start exploring</button>
  </div>
</div>

<article id="storyWindow" class="story-window" aria-live="polite"></article>
<div id="lightbox" class="lightbox">
  <button type="button" id="lightboxClose" aria-label="Close image">×</button>
  <img id="lightboxImage" alt="">
</div>

<script>

// === POPUP
const popup = document.getElementById("popup");
const closePopup = document.getElementById("closePopup");

if (!localStorage.getItem("seenPopup")) {
  popup.classList.add("visible");
}

closePopup.onclick = () => {
  popup.classList.remove("visible");
  localStorage.setItem("seenPopup", "true");
};

// === POI STORIES
const storyWindow = document.getElementById("storyWindow");
const lightbox = document.getElementById("lightbox");
const lightboxImage = document.getElementById("lightboxImage");
const lightboxClose = document.getElementById("lightboxClose");
let activeStory = null;
let activeImageIndex = 0;
let touchStartX = null;

function escapeHTML(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function openStory(poi) {
  activeStory = poi;
  activeImageIndex = 0;
  renderStory();
}

function renderStory() {
  let poi = activeStory;
  if (!poi) return;

  let title = escapeHTML(poi.title || "Untitled stop");
  let date = poi.date ? `<div class="story-date">${escapeHTML(poi.date)}</div>` : "";
  let images = poi.images || [];
  let currentImage = images[activeImageIndex];
  let gallery = currentImage ? `
    <div class="story-media">
      <img src="${escapeHTML(currentImage.src)}" alt="${escapeHTML(currentImage.alt || poi.title || "Point of interest image")}">
      ${images.length > 1 ? `
        <div class="story-gallery-controls">
          <button class="story-prev" type="button" aria-label="Previous image">‹</button>
          <button class="story-next" type="button" aria-label="Next image">›</button>
        </div>
        <div class="story-image-count">${activeImageIndex + 1} / ${images.length}</div>
      ` : ""}
    </div>
  ` : "";
  let body = (poi.body || []).map(paragraph => `<p>${escapeHTML(paragraph)}</p>`).join("");
  let tags = (poi.tags || []).map(tag => `<span>${escapeHTML(tag)}</span>`).join("");
  let details = Object.entries(poi.details || {})
    .filter(([, value]) => value !== null && value !== undefined && String(value).trim() !== "")
    .map(([key, value]) => `
      <div>
        <dt>${escapeHTML(key)}</dt>
        <dd>${escapeHTML(value)}</dd>
      </div>
    `).join("");

  storyWindow.innerHTML = `
    <div class="story-header">
      <div>
        <h2>${title}</h2>
        ${date}
      </div>
      <button class="story-close" type="button" aria-label="Close story">×</button>
    </div>
    ${gallery}
    <div class="story-body">
      ${poi.summary ? `<p><strong>${escapeHTML(poi.summary)}</strong></p>` : ""}
      ${details ? `<dl class="story-details">${details}</dl>` : ""}
      ${body}
      ${tags ? `<div class="story-tags">${tags}</div>` : ""}
    </div>
  `;

  storyWindow.classList.add("visible");
  storyWindow.querySelector(".story-close").onclick = closeStory;
  let activeImage = storyWindow.querySelector(".story-media img");

  if (activeImage) {
    activeImage.onclick = () => openLightbox(currentImage);
  }

  let media = storyWindow.querySelector(".story-media");

  if (media && images.length > 1) {
    media.ontouchstart = event => {
      touchStartX = event.touches[0].clientX;
    };
    media.ontouchend = event => {
      if (touchStartX === null) return;
      let delta = event.changedTouches[0].clientX - touchStartX;
      touchStartX = null;

      if (Math.abs(delta) < 45) return;
      activeImageIndex = delta < 0
        ? (activeImageIndex + 1) % images.length
        : (activeImageIndex - 1 + images.length) % images.length;
      renderStory();
    };
  }

  let previous = storyWindow.querySelector(".story-prev");
  let next = storyWindow.querySelector(".story-next");

  if (previous) {
    previous.onclick = () => {
      activeImageIndex = (activeImageIndex - 1 + images.length) % images.length;
      renderStory();
    };
  }

  if (next) {
    next.onclick = () => {
      activeImageIndex = (activeImageIndex + 1) % images.length;
      renderStory();
    };
  }
}

function closeStory() {
  activeStory = null;
  storyWindow.classList.remove("visible");
  storyWindow.innerHTML = "";
}

function openLightbox(image) {
  if (!image) return;
  lightboxImage.src = image.src;
  lightboxImage.alt = image.alt || "";
  lightbox.classList.add("visible");
}

function closeLightbox() {
  lightbox.classList.remove("visible");
  lightboxImage.src = "";
}

lightboxClose.onclick = closeLightbox;
lightbox.onclick = event => {
  if (event.target === lightbox) closeLightbox();
};

const poiLayer = L.featureGroup();

function addPOIMarkers(points) {
  const markerTypes = {
    info: "i",
    sun: "☀",
    star: "★",
    camera: "⌾",
    camp: "△",
    food: "+",
    forest: "♣",
    mountain: "▲",
    fish: "🎣",
    surf: "≈"
  };

  function iconForPOI(poi) {
    let marker = String(poi.marker || poi.icon || "info").toLowerCase();
    if (!markerTypes[marker]) marker = "info";

    return L.divIcon({
    className: "",
      html: `<div class="poi-marker ${marker}">${markerTypes[marker]}</div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13]
  });
  }

  points.forEach(poi => {
    if (poi.published === false) return;

    let coords = poi.coordinates;

    if (!Array.isArray(coords) || coords.length < 2) return;

    let marker = L.marker([coords[1], coords[0]], {
      icon: iconForPOI(poi),
      title: poi.title || "Point of interest",
      zIndexOffset: 900
    });

    marker.on("click", () => openStory(poi));
    marker.addTo(poiLayer);
  });
}

// === FISHING
const fishPanel = document.getElementById("fishPanel");
const fishMenuButton = document.getElementById("fishMenuButton");
const fishToggle = document.getElementById("fishToggle");
const fishStats = document.getElementById("fishStats");
const fishLayer = L.featureGroup();

fishMenuButton.onclick = () => {
  let isOpen = fishPanel.classList.toggle("open");
  fishMenuButton.setAttribute("aria-expanded", String(isOpen));

  if (isOpen) {
    hikePanel.classList.remove("open");
    hikeMenuButton.setAttribute("aria-expanded", "false");
    surfPanel.classList.remove("open");
    surfMenuButton.setAttribute("aria-expanded", "false");
  }
};

function fishLabel(entry) {
  let details = entry.details || {};
  let species = details.Species || entry.title || "Catch";
  let size = details.Size ? ` · ${details.Size}` : "";
  let timestamp = details["Caught time"] || entry.date || "";
  let time = timestamp ? ` · ${timestamp}` : "";
  return `${species}${size}${time}`;
}

function renderFishStats(entries) {
  let totals = new Map();

  entries.forEach(entry => {
    if (entry.published === false) return;

    let details = entry.details || {};
    let species = String(details.Species || "Unknown").trim() || "Unknown";
    let count = Number.parseFloat(details.Count || "1");

    totals.set(species, (totals.get(species) || 0) + (Number.isFinite(count) ? count : 1));
  });

  let rows = [...totals.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

  fishStats.innerHTML = rows.length
    ? rows.map(([species, count]) => `<span><span>${escapeHTML(species)}</span><strong>${count.toLocaleString()}</strong></span>`).join("")
    : "<span>No catches loaded</span>";
}

function addFishingMarkers(entries) {
  fishLayer.clearLayers();

  entries.forEach(entry => {
    if (entry.published === false) return;

    let coords = entry.coordinates;
    if (!Array.isArray(coords) || coords.length < 2) return;

    let marker = L.marker([coords[1], coords[0]], {
      icon: L.divIcon({
        className: "",
        html: `<div class="poi-marker fish">🎣</div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 13]
      }),
      title: fishLabel(entry),
      zIndexOffset: 950
    });

    marker.bindTooltip(fishLabel(entry), { direction: "top", offset: [0, -10] });
    marker.on("click", () => openStory(entry));
    marker.addTo(fishLayer);
  });

  renderFishStats(entries);
  fishToggle.disabled = fishLayer.getLayers().length === 0;
}

fishToggle.onchange = () => {
  if (fishToggle.checked) {
    fishLayer.addTo(map);

    if (fishLayer.getLayers().length > 0) {
      map.fitBounds(fishLayer.getBounds(), { padding: [50, 50] });
    }
  } else {
    fishLayer.removeFrom(map);
  }
};

function addSurfMarkers(entries) {

surfToggle.onchange = () => {

// === HIKES
const hikePanel = document.getElementById("hikePanel");
const hikeMenuButton = document.getElementById("hikeMenuButton");
const hikeToggle = document.getElementById("hikeToggle");
const hikeStats = document.getElementById("hikeStats");
const hikeLayer = L.featureGroup();

hikeMenuButton.onclick = () => {
  let isOpen = hikePanel.classList.toggle("open");
  hikeMenuButton.setAttribute("aria-expanded", String(isOpen));

  if (isOpen) {
    fishPanel.classList.remove("open");
    fishMenuButton.setAttribute("aria-expanded", "false");
    surfPanel.classList.remove("open");
    surfMenuButton.setAttribute("aria-expanded", "false");
  }
};

function hikeFeatureToStory(feature, storiesById) {
  let properties = feature.properties || {};
  let customStory = storiesById[properties.id] || {};
  let body = customStory.body || properties.body || [];
  let images = customStory.images || properties.images || [];
  let tags = customStory.tags || properties.tags || ["hike"];

  return {
    id: properties.id,
    title: customStory.title || properties.title,
    date: customStory.date || properties.date,
    summary: customStory.summary || properties.summary,
    body,
    images,
    tags
  };
}

function renderHikeStats(stats) {
  hikeStats.innerHTML = `
    <span><strong>${Number(stats.hike_count || 0).toLocaleString()}</strong> hikes</span>
    <span><strong>${Number(stats.distance_km || 0).toLocaleString()}</strong> km total</span>
    <span><strong>${Number(stats.ascent_m || 0).toLocaleString()}</strong> m ascent</span>
    <span><strong>${Number(stats.descent_m || 0).toLocaleString()}</strong> m descent</span>
  `;
}

function addHikes(data, storiesById = {}) {
  let hikeIcon = L.divIcon({
    className: "",
    html: '<div class="hike-marker">🚶</div>',
    iconSize: [26, 26],
    iconAnchor: [13, 13]
  });

  (data.features || []).forEach(feature => {
    let coordinates = feature.geometry?.coordinates || [];
    if (coordinates.length < 2) return;

    let latLngs = coordinates.map(coord => [coord[1], coord[0]]);
    let properties = feature.properties || {};
    let start = properties.start || coordinates[0];

    L.polyline(latLngs, {
      color: "#16a34a",
      weight: 5,
      opacity: 0.85
    }).addTo(hikeLayer).on("click", () => openStory(hikeFeatureToStory(feature, storiesById)));

    L.marker([start[1], start[0]], {
      icon: hikeIcon,
      title: properties.title || "Hike",
      zIndexOffset: 850
    }).addTo(hikeLayer).on("click", () => openStory(hikeFeatureToStory(feature, storiesById)));
  });
}

Promise.all([
  fetch('hikes.geojson').then(res => res.ok ? res.json() : { features: [] }),
  fetch('hikes_stats.json').then(res => res.ok ? res.json() : {}),
  fetch('hike_stories.json').then(res => res.ok ? res.json() : {})
]).then(([hikes, stats, hikeStories]) => {
  addHikes(hikes, hikeStories || {});
  renderHikeStats(stats);
  hikeToggle.disabled = (hikes.features || []).length === 0;
}).catch(error => {
  console.warn("Hike data not loaded:", error);
  hikeStats.innerHTML = "<span>No hikes loaded</span>";
  hikeToggle.disabled = true;
});

hikeToggle.onchange = () => {
  if (hikeToggle.checked) {
    hikeLayer.addTo(map);

    if (hikeLayer.getLayers().length > 0) {
      map.fitBounds(hikeLayer.getBounds(), { padding: [50, 50] });
    }
  } else {
    hikeLayer.removeFrom(map);
  }
};

// === MAP INIT
var map = L.map('map').setView([-25, 135], 4);

// === MAP STYLES
var layers = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
  terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'),

};

layers.osm.addTo(map);
poiLayer.addTo(map);

// === STYLE SWITCHER
document.querySelectorAll('.map-btn').forEach(btn => {
  btn.onclick = () => {

    btn.classList.add('active');

// === ODO
Promise.all([
  fetch('odo.json').then(res => res.json()),
  fetch('route_meta.json').then(res => res.ok ? res.json() : {})
]).then(([data, meta]) => {
  let trip = data.current_odo - data.trip_start_odo;
  let lastUpdated = meta.latest_time ? new Date(meta.latest_time).toLocaleString() : "No GPS update yet";

  document.querySelector("#odoTile .odo-values").innerHTML =
    `🚐 ${data.current_odo.toLocaleString()} km<br>🗺 ${trip.toLocaleString()} km trip<br>⏱ ${escapeHTML(lastUpdated)}`;
});

// === LOAD ROUTES
Promise.all([
  fetch('route_past.geojson').then(r => r.json()),
  fetch('route_live.geojson').then(r => r.json())
]).then(([past, live]) => {

  let raw = [...(past.features || []), ...(live.features || [])];

  let segments = [];
  let latestPoint = null;
  let latestTime = null;

  raw.forEach(f => {
    let coords = f.geometry.coordinates;
    let times = f.properties?.times || [];

    if (!coords || coords.length === 0) return;

    if (Array.isArray(coords[0][0])) coords = coords[0];

    if (coords.length > 0) {
      let point = coords[coords.length - 1];
      latestPoint = [point[1], point[0]];
      latestTime = times[times.length - 1] || f.properties?.label || null;
    }

    for (let i = 1; i < coords.length; i++) {
      segments.push({
        coords: [
          [coords[i-1][1], coords[i-1][0]],
          [coords[i][1], coords[i][0]]
        ],
        time: times[Math.min(i, times.length - 1)] || null
      });
    }
  });

  console.log("SEGMENTS:", segments.length);

  if (latestPoint) {
    let currentIcon = L.divIcon({
      className: "",
      html: '<div class="current-marker"></div>',
      iconSize: [24, 24],
      iconAnchor: [12, 24]
    });

    L.marker(latestPoint, { icon: currentIcon, zIndexOffset: 1000 })
      .bindPopup(latestTime ? `Last updated: ${latestTime}` : "Last updated location")
      .addTo(map);
  }

  if (segments.length === 0) return;

  let layerGroup = L.featureGroup().addTo(map);

  // === SLIDER
  let slider = document.createElement("input");
  slider.type = "range";
  slider.className = "slider";
  slider.min = 0;
  slider.max = segments.length - 1;
  slider.value = segments.length - 1;
  document.body.appendChild(slider);

  // === LABEL
  let label = document.createElement("div");
  label.className = "label";
  document.body.appendChild(label);

  function draw(index) {
    layerGroup.clearLayers();

    for (let i = 0; i <= index; i++) {
      L.polyline(segments[i].coords, {
        color: `hsl(${(i / segments.length) * 360}, 80%, 50%)`,
        weight: 4
      }).addTo(layerGroup);
    }

    let t = segments[index].time;

    if (t) {
      let d = new Date(t);
      label.innerHTML = "📅 " + d.toLocaleDateString();
    } else {
      label.innerText = "No date";
    }
  }

  // initial draw
  draw(segments.length - 1);

  // zoom once
  let bounds = layerGroup.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding:[50,50] });
  }

  slider.oninput = () => draw(parseInt(slider.value));

});
