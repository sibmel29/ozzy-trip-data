<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Oz Trip</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: system-ui; }
#map { height:100vh; }

/* Slider */
.slider {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  z-index: 1000;
}

/* Date label */
.label {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 18px;
  border-radius: 14px;
  text-align: center;
  font-size: 14px;
  backdrop-filter: blur(8px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  z-index: 1000;
}

/* ODO tile */
.odo {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* Map style panel */
.panel {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.map-btn {
  display: block;
  margin: 5px 0;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  background: #eee;
  cursor: pointer;
}

.map-btn.active {
  background: #ff5500;
  color: white;
}

.current-marker {
  position: relative;
  width: 24px;
  height: 24px;
}

.current-marker::before {
  content: "";
  position: absolute;
  inset: 3px;
  background: #ff5500;
  border: 3px solid white;
  border-radius: 50% 50% 50% 0;
  box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  transform: rotate(-45deg);
}

.current-marker::after {
  content: "";
  position: absolute;
  top: 9px;
  left: 9px;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="odo" id="odoTile">🚐 Loading...</div>

<div class="panel">
  <button class="map-btn active" data-style="osm">🗺</button>
  <button class="map-btn" data-style="terrain">🏔</button>
  <button class="map-btn" data-style="sat">🛰</button>
</div>

<script>

// === MAP INIT
var map = L.map('map').setView([-25, 135], 4);

// === MAP STYLES
var layers = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
  terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
};

layers.osm.addTo(map);

// === STYLE SWITCHER
document.querySelectorAll('.map-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    Object.values(layers).forEach(l => map.removeLayer(l));
    layers[btn.dataset.style].addTo(map);
  };
});

// === ODO
fetch('odo.json')
.then(res => res.json())
.then(data => {
  let trip = data.current_odo - data.trip_start_odo;

  document.getElementById("odoTile").innerHTML =
    `🚐 ${data.current_odo.toLocaleString()} km<br>🗺 ${trip.toLocaleString()} km trip`;
});

// === LOAD ROUTES
Promise.all([
  fetch('route_past.geojson').then(r => r.json()),
  fetch('route_live.geojson').then(r => r.json())
]).then(([past, live]) => {

  let raw = [...(past.features || []), ...(live.features || [])];

  let segments = [];
  let latestPoint = null;
  let latestTime = null;

  raw.forEach(f => {
    let coords = f.geometry.coordinates;
    let times = f.properties?.times || [];

    if (!coords || coords.length === 0) return;

    if (Array.isArray(coords[0][0])) coords = coords[0];

    if (coords.length > 0) {
      let point = coords[coords.length - 1];
      latestPoint = [point[1], point[0]];
      latestTime = times[times.length - 1] || f.properties?.label || null;
    }

    for (let i = 1; i < coords.length; i++) {
      segments.push({
        coords: [
          [coords[i-1][1], coords[i-1][0]],
          [coords[i][1], coords[i][0]]
        ],
        time: times[Math.min(i, times.length - 1)] || null
      });
    }
  });

  console.log("SEGMENTS:", segments.length);

  if (latestPoint) {
    let currentIcon = L.divIcon({
      className: "",
      html: '<div class="current-marker"></div>',
      iconSize: [24, 24],
      iconAnchor: [12, 24]
    });

    L.marker(latestPoint, { icon: currentIcon, zIndexOffset: 1000 })
      .bindPopup(latestTime ? `Last updated: ${latestTime}` : "Last updated location")
      .addTo(map);
  }

  if (segments.length === 0) return;

  let layerGroup = L.featureGroup().addTo(map);

  // === SLIDER
  let slider = document.createElement("input");
  slider.type = "range";
  slider.className = "slider";
  slider.min = 0;
  slider.max = segments.length - 1;
  slider.value = segments.length - 1;
  document.body.appendChild(slider);

  // === LABEL
  let label = document.createElement("div");
  label.className = "label";
  document.body.appendChild(label);

  function draw(index) {
    layerGroup.clearLayers();

    for (let i = 0; i <= index; i++) {
      L.polyline(segments[i].coords, {
        color: `hsl(${(i / segments.length) * 360}, 80%, 50%)`,
        weight: 4
      }).addTo(layerGroup);
    }

    let t = segments[index].time;

    if (t) {
      let d = new Date(t);
      label.innerHTML = "📅 " + d.toLocaleDateString();
    } else {
      label.innerText = "No date";
    }
  }

  // initial draw
  draw(segments.length - 1);

  // zoom once
  let bounds = layerGroup.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding:[50,50] });
  }

  slider.oninput = () => draw(parseInt(slider.value));

});

</script>

</body>
</html>
