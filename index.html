<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Oz Trip Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: system-ui; }
#map { height:100vh; }

.slider {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  z-index: 1000;
}

.label {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// === MAP
var map = L.map('map').setView([-25,135], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
.addTo(map);

// === LOAD GEOJSON
fetch('route_past.geojson')
.then(res => res.json())
.then(data => {

  console.log("DATA:", data);

  if (!data.features || data.features.length === 0) {
    console.error("No features in GeoJSON");
    return;
  }

  let coords = data.features[0].geometry.coordinates;

  // handle nested coords safely
  if (Array.isArray(coords[0]) && Array.isArray(coords[0][0])) {
    coords = coords[0];
  }

  console.log("COORDS COUNT:", coords.length);

  if (coords.length < 2) {
    console.error("Not enough points");
    return;
  }

  // build segments
  let segments = [];
  for (let i = 1; i < coords.length; i++) {
    segments.push([coords[i-1], coords[i]]);
  }

  console.log("SEGMENTS:", segments.length);

  let layerGroup = L.featureGroup().addTo(map);

  // slider
  let slider = document.createElement("input");
  slider.type = "range";
  slider.className = "slider";
  slider.min = 0;
  slider.max = segments.length - 1;
  slider.value = segments.length - 1;
  document.body.appendChild(slider);

  let label = document.createElement("div");
  label.className = "label";
  document.body.appendChild(label);

  function draw(index) {
  layerGroup.clearLayers();

  for (let i = 0; i <= index; i++) {
    L.polyline(segments[i], {
      color: `hsl(${i * 20}, 80%, 50%)`,
      weight: 4
    }).addTo(layerGroup);
  }

  label.innerText = "Step: " + index;
  }

  // initial draw
  draw(segments.length - 1);

  let bounds = layerGroup.getBounds();
  if (bounds.isValid()) {
  map.fitBounds(bounds, { padding: [50,50] });
  }
  
  slider.addEventListener("input", (e) => {
    draw(parseInt(e.target.value));
  });

})
.catch(err => {
  console.error("FAILED TO LOAD GEOJSON:", err);
});

</script>

</body>
</html>
