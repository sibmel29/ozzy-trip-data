name: Add POI
description: Add a point of interest to the trip map from your phone.
title: "[POI] "
labels: ["poi-request"]
body:
  - type: markdown
    attributes:
      value: |
        Fill this in from your phone. When you submit, GitHub Actions will add the POI to `poi.json`.

        Share the place from Google Maps and paste its link below. Longitude and latitude are only fallback options.
  - type: input
    id: poi_title
    attributes:
      label: POI title
      placeholder: Rabbits Eat Lettuce Festival
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Date
      placeholder: "2026-04-01"
    validations:
      required: false
  - type: input
    id: maps_link
    attributes:
      label: Google Maps link
      description: Required. In Google Maps, open the place, tap Share, then paste the link here.
      placeholder: https://maps.app.goo.gl/example
    validations:
      required: true
  - type: input
    id: longitude
    attributes:
      label: Longitude
      description: Optional fallback only. Leave blank when using the Google Maps link.
      placeholder: "150.892986"
    validations:
      required: false
  - type: input
    id: latitude
    attributes:
      label: Latitude
      description: Optional fallback only. Leave blank when using the Google Maps link.
      placeholder: "-28.688287"
    validations:
      required: false
  - type: dropdown
    id: marker
    attributes:
      label: Marker
      options:
        - info
        - sun
        - star
        - camera
        - camp
        - food
        - forest
        - mountain
      default: 0
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: Short summary
      placeholder: A beautiful place full of crazy people
    validations:
      required: false
  - type: textarea
    id: body
    attributes:
      label: Story text
      description: Use blank lines if you want separate paragraphs.
      placeholder: Write the story here.
    validations:
      required: false
  - type: dropdown
    id: published
    attributes:
      label: Published
      description: Choose draft if you do not want it visible on the map yet.
      options:
        - "yes"
        - "draft"
      default: 0
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Separate with commas.
      placeholder: coast, festival, volunteering
    validations:
      required: false
  - type: textarea
    id: images
    attributes:
      label: Image paths
      description: Optional. Paste GitHub uploaded image links, normal image URLs, or existing repo image paths. Remote images are compressed into poi-media automatically.
      placeholder: |
        ![photo](https://github.com/user-attachments/assets/example)
        https://example.com/photo.jpg
        poi-media/rabbits/1.jpg
    validations:
      required: false
