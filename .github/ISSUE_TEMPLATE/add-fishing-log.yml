name: Add fishing log
description: Add a fishing journal entry to the map.
title: "[FISHING] "
labels: ["fishing-log"]
body:
  - type: markdown
    attributes:
      value: |
        Fill this in from your phone. When you submit, GitHub Actions will add the entry to `fishing-log.json`.
  - type: input
    id: title
    attributes:
      label: Fishing log title
      description: A short title for this fishing session.
      placeholder: "Flathead at Jervis Bay"
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Date
      placeholder: "2026-05-07"
    validations:
      required: false
  - type: input
    id: caught_time
    attributes:
      label: Caught time
      description: Optional time or timestamp for this catch/session.
      placeholder: "16:35"
    validations:
      required: false
  - type: input
    id: maps_link
    attributes:
      label: Google Maps link
      description: Optional. Paste a Maps link instead of coordinates when possible.
      placeholder: https://maps.google.com/?q=-35.047,150.744
    validations:
      required: false
  - type: input
    id: longitude
    attributes:
      label: Longitude
      description: Optional if you pasted a Google Maps link.
      placeholder: "150.744"
    validations:
      required: false
  - type: input
    id: latitude
    attributes:
      label: Latitude
      description: Optional if you pasted a Google Maps link.
      placeholder: "-35.047"
    validations:
      required: false
  - type: input
    id: spot_name
    attributes:
      label: Spot name
      placeholder: "Jervis Bay"
    validations:
      required: false
  - type: dropdown
    id: species_1
    attributes:
      label: Species 1
      description: Main species caught in this session.
      options:
        - Other / not listed
        - No catch
        - Albacore
        - Amberjack
        - Atlantic Salmon
        - Australian Bass
        - Australian Salmon
        - Balmain Bug
        - Black Bream
        - Blue Swimmer Crab
        - Bonito
        - Brown Trout
        - Carp
        - Cobia
        - Dusky Flathead
        - Estuary Perch
        - Garfish
        - Golden Perch
        - Hairtail
        - Leatherjacket
        - Luderick
        - Mahi Mahi
        - Mangrove Jack
        - Mulloway
        - Murray Cod
        - Pearl Perch
        - Rainbow Trout
        - Redfin Perch
        - Rock Blackfish
        - Sand Whiting
        - Snapper
        - Southern Bluefin Tuna
        - Squid
        - Tailor
        - Tarwhine
        - Trevallies
        - Wahoo
        - Yabby
        - Yellowfin Bream
        - Yellowfin Tuna
        - Yellowtail Kingfish
      default: 0
    validations:
      required: false
  - type: input
    id: species_1_other
    attributes:
      label: Species 1 other
      description: Fill this only if Species 1 is Other / not listed.
      placeholder: "Pompano"
    validations:
      required: false
  - type: input
    id: count_1
    attributes:
      label: Count 1
      placeholder: "2"
    validations:
      required: false
  - type: input
    id: size_1
    attributes:
      label: Size 1
      placeholder: "42 cm"
    validations:
      required: false
  - type: dropdown
    id: species_2
    attributes:
      label: Species 2
      description: Optional second species.
      options:
        - none
        - Other / not listed
        - Albacore
        - Amberjack
        - Atlantic Salmon
        - Australian Bass
        - Australian Salmon
        - Black Bream
        - Bonito
        - Dusky Flathead
        - Golden Perch
        - Luderick
        - Mahi Mahi
        - Mulloway
        - Sand Whiting
        - Snapper
        - Squid
        - Tailor
        - Trevallies
        - Yellowfin Bream
        - Yellowtail Kingfish
      default: 0
    validations:
      required: false
  - type: input
    id: species_2_other
    attributes:
      label: Species 2 other
      placeholder: "Species name"
    validations:
      required: false
  - type: input
    id: count_2
    attributes:
      label: Count 2
      placeholder: "1"
    validations:
      required: false
  - type: input
    id: size_2
    attributes:
      label: Size 2
      placeholder: "35 cm"
    validations:
      required: false
  - type: dropdown
    id: species_3
    attributes:
      label: Species 3
      description: Optional third species.
      options:
        - none
        - Other / not listed
        - Albacore
        - Amberjack
        - Australian Bass
        - Australian Salmon
        - Black Bream
        - Bonito
        - Dusky Flathead
        - Luderick
        - Mahi Mahi
        - Mulloway
        - Sand Whiting
        - Snapper
        - Squid
        - Tailor
        - Trevallies
        - Yellowfin Bream
        - Yellowtail Kingfish
      default: 0
    validations:
      required: false
  - type: input
    id: species_3_other
    attributes:
      label: Species 3 other
      placeholder: "Species name"
    validations:
      required: false
  - type: input
    id: count_3
    attributes:
      label: Count 3
      placeholder: "1"
    validations:
      required: false
  - type: input
    id: size_3
    attributes:
      label: Size 3
      placeholder: "35 cm"
    validations:
      required: false
  - type: dropdown
    id: species_4
    attributes:
      label: Species 4
      description: Optional fourth species.
      options:
        - none
        - Other / not listed
        - Albacore
        - Amberjack
        - Australian Bass
        - Australian Salmon
        - Black Bream
        - Bonito
        - Dusky Flathead
        - Luderick
        - Mahi Mahi
        - Mulloway
        - Sand Whiting
        - Snapper
        - Squid
        - Tailor
        - Trevallies
        - Yellowfin Bream
        - Yellowtail Kingfish
      default: 0
    validations:
      required: false
  - type: input
    id: species_4_other
    attributes:
      label: Species 4 other
      placeholder: "Species name"
    validations:
      required: false
  - type: input
    id: count_4
    attributes:
      label: Count 4
      placeholder: "1"
    validations:
      required: false
  - type: input
    id: size_4
    attributes:
      label: Size 4
      placeholder: "35 cm"
    validations:
      required: false
  - type: dropdown
    id: kept_released
    attributes:
      label: Kept or released
      options:
        - released
        - kept
        - mixed
        - no catch
      default: 0
    validations:
      required: false
  - type: input
    id: bait_lure
    attributes:
      label: Bait or lure
      placeholder: "Soft plastic, pilchard, squid jig..."
    validations:
      required: false
  - type: input
    id: conditions
    attributes:
      label: Conditions
      placeholder: "Incoming tide, light wind"
    validations:
      required: false
  - type: textarea
    id: summary
    attributes:
      label: Short summary
      description: One sentence shown at the top of the popup.
      placeholder: Quick note about the session.
    validations:
      required: false
  - type: textarea
    id: story
    attributes:
      label: Story text
      description: Longer recap. Blank is okay.
      placeholder: Write the story here.
    validations:
      required: false
  - type: textarea
    id: images
    attributes:
      label: Image paths
      description: Optional. Paste uploaded GitHub issue image links, one per line.
      placeholder: https://github.com/user-attachments/assets/...
    validations:
      required: false
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Optional comma-separated tags.
      placeholder: "fishing, coast"
    validations:
      required: false
  - type: dropdown
    id: published
    attributes:
      label: Published
      description: Choose draft if you do not want it visible on the map yet.
      options:
        - "yes"
        - "draft"
      default: 0
    validations:
      required: true
