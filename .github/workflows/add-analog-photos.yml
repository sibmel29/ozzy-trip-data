name: Manage analog gallery

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  add-analog-photos:
    if: contains(github.event.issue.labels.*.name, 'analog-gallery') || startsWith(github.event.issue.title, '[ANALOG]') || contains(github.event.issue.body, '### Photo uploads')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image tools
        run: pip install pillow

      - name: Process analog photos
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: python scripts/add_analog_photos_from_issue.py

      - name: Commit gallery update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add analog-gallery/gallery.json analog-gallery/thumbs analog-gallery/web
          git diff --cached --quiet && echo "No gallery changes to commit" && exit 0
          git commit -m "Update analog gallery from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync("analog_gallery_result.json", "utf8"));
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Added **${result.count}** photos to the analog gallery from **${result.collection_title}**.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
