name: Process GPX

on:
  push:
    paths:
      - '*.gpx'
      - 'hikes/gpx/*.gpx'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gpxpy

      - name: Process car route
        run: python geojson_merge.py

      - name: Process hike routes
        run: python process_hikes.py

      - name: Commit updated route data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add route_live.geojson hikes.geojson hikes_stats.json
          git diff --cached --quiet && echo "No generated route changes to commit" && exit 0
          git commit -m "Update route data"
          git push
