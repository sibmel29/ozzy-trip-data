name: Process GPX

on:
  push:
    paths:
      - '*.gpx'
      - '*.GPX'
      - 'car/gpx/*.gpx'
      - 'car/gpx/*.GPX'
      - 'hikes/gpx/*.gpx'
      - 'hikes/gpx/*.GPX'
      - 'hike-media/**/*.jpg'
      - 'hike-media/**/*.JPG'
      - 'hike-media/**/*.jpeg'
      - 'hike-media/**/*.JPEG'
      - 'hike-media/**/*.png'
      - 'hike-media/**/*.PNG'
      - 'hike-media/**/*.webp'
      - 'hike-media/**/*.WEBP'
      - 'hike_stories.json'
      - 'geojson_merge.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gpxpy

      - name: Process car route
        run: ARCHIVE_CAR_GPX=1 python geojson_merge.py

      - name: Process hike routes
        run: python process_hikes.py

      - name: Commit updated route data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add route_live.geojson route_meta.json car hikes.geojson hikes_stats.json hike-media
          git diff --cached --quiet && echo "No generated route changes to commit" && exit 0
          git commit -m "Update route data"
          git push
