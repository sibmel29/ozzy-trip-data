name: Process GPX

on:
  push:
    paths:
      - '*.gpx'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gpxpy

      - name: Run script
        run: python geojson_merge.py

      - name: Commit updated geojson
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add route_live.geojson
          git diff --cached --quiet && echo "No route changes to commit" && exit 0
          git commit -m "Update route"
          git push
